name: Build & Deploy to Dev (ikidev)

on:
  push:
    branches:
      - 'claude/**'

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VUE_APP_API_URL: https://ikidev.commandc.ru/api

      - name: Copy server files into dist
        run: |
          cp api-proxy.php dist/
          cp api-emotions.php dist/
          cp .htaccess dist/

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: commano5.beget.tech
          username: commano5_main
          password: ${{ secrets.BEGET_SSH_PASSWORD }}
          source: "dist/*"
          target: "ikidev.commandc.ru/public_html"
          strip_components: 1
          overwrite: true
