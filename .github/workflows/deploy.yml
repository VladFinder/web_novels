name: Build & Deploy to Beget

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VUE_APP_API_URL: https://iki.commandc.ru/api

      - name: Deploy frontend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: commano5.beget.tech
          username: commano5_main
          password: ${{ secrets.BEGET_SSH_PASSWORD }}
          source: "dist/*"
          target: "iki.commandc.ru/public_html"
          strip_components: 1
          overwrite: true

      - name: Deploy PHP proxy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: commano5.beget.tech
          username: commano5_main
          password: ${{ secrets.BEGET_SSH_PASSWORD }}
          source: "api-proxy.php,api-emotions.php,.htaccess"
          target: "iki.commandc.ru/public_html"
          overwrite: true
