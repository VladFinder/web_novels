<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RenJS Demo | Web Novels</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Mulish", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #f7f7f7;
      overflow: hidden;
    }
    #game {
      width: 100%;
      height: 100vh;
    }
    .fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
      background: radial-gradient(circle at 30% 30%, #20242b, #0f1115 60%);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/renjs@3.5.0/dist/renjs.min.js"></script>
</head>
<body>
  <div id="game" aria-label="RenJS game area"></div>
  <div id="fallback" class="fallback" hidden>
    <div>
      <h1>RenJS не загрузился</h1>
      <p>Проверь подключение к CDN или открой консоль для подробностей.</p>
    </div>
  </div>
  <script>
    (function startRenJSDemo() {
      const config = {
        name: "Web Novels | RenJS Demo",
        plugins: ["Menu", "DialogLog", "Notifications", "Choices"],
        characters: {
          ai: { name: "Ай", color: "#FF7DBB" },
          leo: { name: "Leo", color: "#4A90E2" }
        },
        assets: {
          backgrounds: {
            dawn: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1600&q=80"
          },
          images: {},
          music: {},
          sounds: {}
        },
        script: {
          Start: [
            "scene dawn",
            "ai Привет! Это мини-демо RenJS внутри вашего проекта.",
            "leo Мы запускаемся прямо из /public/vn без сборки.",
            "ai Можно хранить сценарии в JSON/JS и ассеты на CDN или локально.",
            "leo Для настоящего сюжета вынеси контент в отдельные файлы и подключи статики.",
            "ai На этом всё. Можно расширять и подключать ваш бэкенд для сохранений.",
            "end"
          ]
        }
      };

      try {
        const game = new RenJS("#game", config);
        game.on("error", (err) => {
          console.error("RenJS error:", err);
          document.getElementById("fallback").hidden = false;
        });
        game.start();
      } catch (err) {
        console.error("RenJS init failed:", err);
        document.getElementById("fallback").hidden = false;
      }
    })();
  </script>
</body>
</html>
